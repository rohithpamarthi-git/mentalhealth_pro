{% extends 'wellness/base.html' %}
{% block content %}
<style>
    /* Scoped styles to match the precise design */
    body {
        background-color: #edf5f5 !important; /* Soft, light teal/blue background */
    }
    
    .main-content {
        background-color: #edf5f5 !important;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        margin: 0;
        max-width: 100% !important;
    }

    .auth-wrapper {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .form-container {
        background: #ffffff;
        width: 100%;
        max-width: 440px;
        padding: 3rem 2.5rem;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.03);
        text-align: center;
        border: 1px solid #eaeaea;
    }

    .form-header {
        margin-bottom: 2rem;
    }

    .app-icon {
        width: 60px;
        height: 60px;
        margin: 0 auto 1.5rem;
        background: linear-gradient(135deg, #2b9b8b, #3388ad);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 32px;
        box-shadow: 0 4px 12px rgba(43, 155, 139, 0.3);
    }

    .form-header h2 {
        font-family: 'Lora', serif;
        color: #12222b;
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
    }

    .form-header p {
        color: #829ba8;
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        font-weight: 400;
        margin: 0;
    }

    .form-group {
        margin-bottom: 1.25rem;
        text-align: left;
    }

    /* Hide standard labels to match the placeholder-based design */
    .form-group label {
        display: none;
    }

    .form-group input {
        width: 100%;
        padding: 0.85rem 1.2rem;
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        color: #334155;
        background-color: #fafafa;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        transition: all 0.2s ease;
        outline: none;
        box-sizing: border-box;
    }

    .form-group input::placeholder {
        color: #94a3b8;
    }

    .form-group input:focus {
        border-color: #3b9b8b;
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(59, 155, 139, 0.1);
    }

    .auth-btn {
        width: 100%;
        padding: 0.85rem;
        font-family: 'Inter', sans-serif;
        font-size: 1rem;
        font-weight: 600;
        color: white;
        background: linear-gradient(to right, #389e8e, #3694b7);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
        margin-top: 1rem;
    }

    .auth-btn:hover {
        opacity: 0.92;
    }
    
    .auth-btn:active {
        transform: translateY(1px);
    }

    .auth-footer {
        margin-top: 1.75rem;
        font-family: 'Inter', sans-serif;
        font-size: 0.9rem;
        color: #64748b;
    }

    .auth-footer a {
        color: #3b9b8b;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
    }

    .auth-footer a:hover {
        color: #2c7a6e;
        text-decoration: underline;
    }
</style>

<div class="auth-wrapper">
    <div class="form-container">
        <div class="form-header">
            <div class="app-icon">
                <i class="ph ph-brain"></i>
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to access your mental health dashboard</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    {{ field }}
                    {% if field.errors %}
                        <div class="error-text" style="color: #dc2626; font-size: 0.85rem; margin-top: 0.25rem;">
                            {{ field.errors.0 }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit" class="auth-btn">Sign In</button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
        </div>
    </div>
</div>

<script>
    // Automatically set placeholders for the inputs based on field name if not set
    document.addEventListener("DOMContentLoaded", function() {
        const inputs = document.querySelectorAll('.form-group input');
        inputs.forEach(input => {
            if (input.name === 'username' && !input.placeholder) {
                input.placeholder = 'Email';
            } else if (input.name === 'password' && !input.placeholder) {
                input.placeholder = 'Password';
            }
        });
    });
</script>
{% endblock %}
