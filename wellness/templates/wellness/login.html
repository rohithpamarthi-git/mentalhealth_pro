{% extends 'wellness/base.html' %}
{% block content %}
<style>
    /* Clean overrides for Auth pages */
    .main-content {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        margin: 0;
        max-width: 100% !important;
    }

    .auth-wrapper {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .form-container {
        background: #ffffff;
        width: 100%;
        max-width: 440px;
        padding: 3rem 2.5rem;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-hover);
        text-align: center;
        border: 1px solid var(--secondary-light);
    }

    .form-header {
        margin-bottom: 2.5rem;
    }

    .form-header h2 {
        color: var(--text-primary);
        font-size: 1.85rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
    }

    .form-header p {
        color: var(--text-muted);
        font-size: 1rem;
        margin: 0;
    }

    .form-group {
        margin-bottom: 1.25rem;
        text-align: left;
    }

    .form-group label {
        display: none;
    }

    .auth-footer {
        margin-top: 2rem;
        font-size: 0.95rem;
        color: var(--text-muted);
    }

    .auth-footer a {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>

<div class="auth-wrapper">
    <div class="form-container">
        <div class="form-header">
            <div class="app-icon" style="width: 64px; height: 64px; margin: 0 auto 1.5rem; background: var(--primary-color); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <i class="ph-fill ph-leaf"></i>
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to access your mental health dashboard</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    {{ field }}
                    {% if field.errors %}
                        <div class="error-text" style="color: #dc2626; font-size: 0.85rem; margin-top: 0.25rem;">
                            {{ field.errors.0 }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.85rem; margin-top: 1rem;">Sign In</button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
        </div>
    </div>
</div>

<script>
    // Automatically set placeholders for the inputs based on field name if not set
    document.addEventListener("DOMContentLoaded", function() {
        const inputs = document.querySelectorAll('.form-group input');
        inputs.forEach(input => {
            if (input.name === 'username' && !input.placeholder) {
                input.placeholder = 'Email';
            } else if (input.name === 'password' && !input.placeholder) {
                input.placeholder = 'Password';
            }
        });
    });
</script>
{% endblock %}
