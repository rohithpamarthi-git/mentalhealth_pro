{% extends 'wellness/base.html' %}
{% block content %}
<style>
    /* Clean overrides for Auth pages */
    .main-content {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        margin: 0;
        max-width: 100% !important;
    }

    .auth-wrapper {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .form-container {
        background: #ffffff;
        width: 100%;
        max-width: 440px;
        padding: 3rem 2.5rem;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-hover);
        text-align: center;
        border: 1px solid var(--secondary-light);
    }

    .form-header {
        margin-bottom: 2.5rem;
    }

    .form-header h2 {
        color: var(--text-primary);
        font-size: 1.85rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
    }

    .form-header p {
        color: var(--text-muted);
        font-size: 1rem;
        margin: 0;
    }

    .form-group {
        margin-bottom: 1.25rem;
        text-align: left;
    }

    .form-group label {
        display: none;
    }

    .help-text {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
        display: block;
    }

    .auth-footer {
        margin-top: 2rem;
        font-size: 0.95rem;
        color: var(--text-muted);
    }

    .auth-footer a {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>

<div class="auth-wrapper">
    <div class="form-container">
        <div class="form-header">
            <div class="app-icon" style="width: 64px; height: 64px; margin: 0 auto 1.5rem; background: var(--primary-color); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <i class="ph-fill ph-leaf"></i>
            </div>
            <h2>Create Account</h2>
            <p>Start your wellness journey today</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <input type="text" name="full_name" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.85rem; margin-top: 1rem;">Create Account</button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
        </div>
    </div>
</div>

{% endblock %}
